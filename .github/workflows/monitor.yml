name: Cavo Zoe availability monitor

on:
  # Hourly safety-net restart. The real checking happens inside the running
  # job's loop (every 3 min) — we do NOT rely on GitHub's flaky short-interval
  # cron, which heavily deprioritizes */5 schedules.
  schedule:
    - cron: "3 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

# A fresh run (hourly cron or manual) replaces the currently looping one.
concurrency:
  group: cavozoe-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Monitor loop (checks every 3 min for ~5.8h)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          end=$(( $(date +%s) + 350*60 ))
          i=0
          while [ "$(date +%s)" -lt "$end" ]; do
            i=$((i+1))
            echo "----- check #$i -----"
            python check.py || true
            sleep 180
          done
          echo "Loop window ended; job will be restarted by the hourly schedule."
