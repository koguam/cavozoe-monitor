name: Cavo Zoe availability monitor

on:
  schedule:
    # Every 5 minutes (GitHub's minimum; may be delayed under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Needed so the job can commit the updated state.json back to the repo.
permissions:
  contents: write

concurrency:
  group: cavozoe-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run availability check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: python check.py

      - name: Persist state (only if changed)
        run: |
          git add state.json 2>/dev/null || true
          if git status --porcelain -- state.json | grep -q .; then
            git config user.name "cavozoe-bot"
            git config user.email "cavozoe-bot@users.noreply.github.com"
            git commit -m "update state [skip ci]"
            git push
          else
            echo "No state change."
          fi
